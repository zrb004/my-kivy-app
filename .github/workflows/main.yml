name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # 1. 强制设定 Java 环境，这是打包最容易崩的地方
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          # 锁定版本，防止最新版不兼容
          sudo pip3 install --upgrade pip
          sudo pip3 install cython==0.29.33 buildozer virtualenv

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # 强制清理之前的失败残留，从头开始
          buildozer android clean
          # 正式开始打包
          yes | buildozer android debug
        env:
          # 这里的环境变量是为了覆盖系统默认路径，防止它乱找 NDK
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: bin/*.apk
